<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <style>
        :root {
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --success: #27ae60;
            --bg: #f5f6fa;
            --card: #fff;
            --text: #2d3436;
            --sub: #636e72;
            --border: #dfe6e9;
            --shadow: 0 2px 12px rgba(0,0,0,.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; padding: 40px 16px;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 640px; }
        h1 {
            text-align: center; color: var(--text); margin-bottom: 24px;
            font-size: 1.8rem; letter-spacing: -.5px;
        }
        .form-card {
            background: var(--card); border-radius: 14px; padding: 20px;
            box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .form-row {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .form-row input[type="text"] {
            flex: 1; min-width: 200px;
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 1rem; outline: none;
            transition: border-color .2s;
        }
        .form-row input[type="text"]:focus { border-color: var(--info); }
        .form-row select {
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 1rem; outline: none;
            background: var(--card); cursor: pointer;
        }
        .form-row button {
            padding: 10px 22px; border: none; border-radius: 8px;
            background: var(--info); color: #fff; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: background .2s;
        }
        .form-row button:hover { background: #2980b9; }
        .todo-list { list-style: none; }
        .todo-item {
            background: var(--card); border-radius: 12px; padding: 14px 18px;
            margin-bottom: 10px; box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 12px;
            transition: transform .15s, box-shadow .15s;
        }
        .todo-item:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.1); }
        .todo-item.done { opacity: .55; }
        .todo-item.done .todo-text { text-decoration: line-through; }
        .badge {
            font-size: .75rem; font-weight: 700; padding: 3px 10px;
            border-radius: 20px; color: #fff; white-space: nowrap;
            letter-spacing: .3px;
        }
        .badge.urgent  { background: var(--danger); }
        .badge.high    { background: var(--warning); }
        .badge.normal  { background: var(--info); }
        .badge.low     { background: var(--success); }
        .todo-text { flex: 1; font-size: 1rem; color: var(--text); word-break: break-word; }
        .todo-time { font-size: .78rem; color: var(--sub); white-space: nowrap; }
        .btn-icon {
            background: none; border: none; cursor: pointer;
            font-size: 1.15rem; padding: 4px 6px; border-radius: 6px;
            transition: background .15s; line-height: 1;
        }
        .btn-icon:hover { background: var(--border); }
        .btn-del { color: var(--danger); }
        .empty {
            text-align: center; color: var(--sub); padding: 40px 0;
            font-size: 1rem;
        }
        .stats {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; font-size: .85rem; color: var(--sub);
        }
        .stats strong { color: var(--text); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 待办事项</h1>

        <div class="form-card">
            <div class="form-row">
                <input type="text" id="todoInput" placeholder="输入新的待办事项…" maxlength="200">
                <select id="urgencySelect">
                    <option value="urgent">🔴 紧急</option>
                    <option value="high" selected>🟠 高</option>
                    <option value="normal">🔵 普通</option>
                    <option value="low">🟢 低</option>
                </select>
                <button id="addBtn">添加</button>
            </div>
        </div>

        <div class="stats">
            <span>共 <strong id="totalCount">0</strong> 项</span>
            <span>未完成 <strong id="pendingCount">0</strong> 项</span>
        </div>

        <ul class="todo-list" id="todoList"></ul>
    </div>

    <script>
        const STORAGE_KEY = 'my_todolist';
        let todos = [];

        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) todos = JSON.parse(raw);
            } catch (_) { todos = []; }
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }

        function urgencyLabel(level) {
            const map = { urgent: '紧急', high: '高', normal: '普通', low: '低' };
            return map[level] || level;
        }

        function render() {
            const list = document.getElementById('todoList');
            if (!todos.length) {
                list.innerHTML = '<div class="empty">✨ 暂无待办，添加一条吧</div>';
            } else {
                list.innerHTML = todos.map((t, i) => {
                    const done = t.done ? ' done' : '';
                    const checked = t.done ? ' checked' : '';
                    return `<li class="todo-item${done}">
                        <input type="checkbox" data-idx="${i}"${checked} title="标记完成/未完成">
                        <span class="badge ${t.urgency}">${urgencyLabel(t.urgency)}</span>
                        <span class="todo-text">${escHtml(t.text)}</span>
                        <span class="todo-time">${t.time}</span>
                        <button class="btn-icon btn-del" data-idx="${i}" title="删除">🗑️</button>
                    </li>`;
                }).join('');
            }
            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('pendingCount').textContent = todos.filter(t => !t.done).length;
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const sel = document.getElementById('urgencySelect');
            const text = input.value.trim();
            if (!text) return;
            const now = new Date();
            const time = now.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
            todos.unshift({ text, urgency: sel.value, time, done: false });
            input.value = '';
            input.focus();
            save();
            render();
        }

        document.getElementById('addBtn').addEventListener('click', addTodo);
        document.getElementById('todoInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTodo();
        });

        document.getElementById('todoList').addEventListener('click', e => {
            const idx = e.target.getAttribute('data-idx');
            if (idx === null) return;
            const i = parseInt(idx, 10);
            if (e.target.type === 'checkbox') {
                todos[i].done = e.target.checked;
            } else if (e.target.classList.contains('btn-del')) {
                todos.splice(i, 1);
            }
            save();
            render();
        });

        load();
        render();
    </script>
</body>
</html>
